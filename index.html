<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MATADOR DREAMS</title>
<style>
/* ═══════════════════════════════════════════════════════════
   MATADOR DREAMS — An Indie Label Simulator
   Brooklyn, 2001-2006
   ═══════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

:root {
    --cream: #F0EBE0;
    --white: #FFFFFF;
    --black: #1A1A1A;
    --post-punk: #4A6B8A;
    --indie-folk: #7A8B6F;
    --garage: #B85450;
    --shoegaze: #9B8AA6;
    --art-rock: #C49B3F;
    --lo-fi: #8B7D6B;
    --dance-punk: #C4658C;
    --green: #4A7C59;
    --red: #B85450;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--cream);
    color: var(--black);
    -webkit-user-select: none;
    user-select: none;
}

body {
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
}

/* Subtle paper texture */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
}

/* ─── TITLE SCREEN ─── */
#title-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    background: var(--cream);
    padding: 2rem;
    transition: opacity 0.6s ease, transform 0.6s ease;
}

#title-screen.hidden {
    opacity: 0;
    transform: scale(0.95);
    pointer-events: none;
}

.vinyl-record {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: conic-gradient(
        from 0deg,
        #1a1a1a 0deg, #2a2a2a 2deg, #1a1a1a 4deg,
        #222 10deg, #1a1a1a 12deg,
        #252525 20deg, #1a1a1a 22deg,
        #222 35deg, #1a1a1a 37deg,
        #2a2a2a 50deg, #1a1a1a 52deg,
        #222 70deg, #1a1a1a 72deg,
        #252525 90deg, #1a1a1a 92deg,
        #222 110deg, #1a1a1a 112deg,
        #2a2a2a 130deg, #1a1a1a 132deg,
        #222 150deg, #1a1a1a 152deg,
        #252525 170deg, #1a1a1a 172deg,
        #222 190deg, #1a1a1a 192deg,
        #2a2a2a 210deg, #1a1a1a 212deg,
        #222 230deg, #1a1a1a 232deg,
        #252525 260deg, #1a1a1a 262deg,
        #222 290deg, #1a1a1a 292deg,
        #2a2a2a 320deg, #1a1a1a 322deg,
        #222 350deg, #1a1a1a 352deg
    );
    position: relative;
    animation: spin 4s linear infinite;
    margin-bottom: 2rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}

.vinyl-record::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--cream);
    transform: translate(-50%, -50%);
    box-shadow: inset 0 0 0 3px var(--red);
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.title-name {
    font-family: 'Space Mono', monospace;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
    text-align: center;
}

.title-line {
    width: 200px;
    height: 2px;
    background: var(--black);
    margin-bottom: 1rem;
}

.title-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 0.2rem;
    text-align: center;
}

.title-era {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: #999;
    margin-bottom: 2.5rem;
    text-align: center;
}

.label-input-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 2rem;
    width: 100%;
    max-width: 300px;
}

.label-input-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
}

#label-name-input {
    width: 100%;
    padding: 0.8rem 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    border: 2px solid var(--black);
    background: var(--white);
    color: var(--black);
    text-align: center;
    outline: none;
    border-radius: 0;
}

#label-name-input::placeholder {
    color: #bbb;
}

#label-name-input:focus {
    border-color: var(--red);
}

.start-btn {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    padding: 1rem 3rem;
    border: 3px solid var(--black);
    background: var(--black);
    color: var(--cream);
    cursor: pointer;
    transition: all 0.2s;
}

.start-btn:hover {
    background: transparent;
    color: var(--black);
}

.start-btn:active {
    transform: scale(0.97);
}

.title-tagline {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-style: italic;
    color: #aaa;
    margin-top: 2rem;
}

/* ─── GAME SCREEN ─── */
#game-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    height: -webkit-fill-available;
    position: relative;
    z-index: 1;
}

#game-screen.active {
    display: flex;
}

/* ─── METERS BAR ─── */
.meters-bar {
    display: flex;
    gap: 0.5rem;
    padding: 0.6rem 1rem;
    background: rgba(240, 235, 224, 0.95);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
}

.meter {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.7rem;
}

.meter-icon {
    font-size: 0.85rem;
    flex-shrink: 0;
}

.meter-bar-outer {
    flex: 1;
    height: 8px;
    background: rgba(0,0,0,0.08);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
}

.meter-bar-inner {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease, background-color 0.5s ease;
    position: relative;
}

.meter-bar-inner.pulse {
    animation: meterPulse 0.4s ease;
}

@keyframes meterPulse {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.4); }
    100% { filter: brightness(1); }
}

.meter-value {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: #888;
    min-width: 20px;
    text-align: right;
    flex-shrink: 0;
}

/* ─── HEADER INFO ─── */
.game-header {
    text-align: center;
    padding: 0.3rem 1rem 0.1rem;
    flex-shrink: 0;
}

.game-label-name {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #999;
}

.game-year {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: #bbb;
}

/* ─── CARD AREA ─── */
.card-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 0.5rem 1rem;
    min-height: 0;
}

/* ─── CARD ─── */
.card {
    width: 92vw;
    max-width: 380px;
    background: var(--white);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    position: relative;
    cursor: grab;
    touch-action: none;
    will-change: transform;
    overflow: hidden;
    max-height: calc(100vh - 200px);
    display: flex;
    flex-direction: column;
}

.card:active {
    cursor: grabbing;
}

.card.swiping {
    transition: none !important;
}

.card.dismissed-left {
    transition: transform 0.4s ease-in, opacity 0.4s ease-in;
    transform: translateX(-150vw) rotate(-30deg) !important;
    opacity: 0;
    pointer-events: none;
}

.card.dismissed-right {
    transition: transform 0.4s ease-in, opacity 0.4s ease-in;
    transform: translateX(150vw) rotate(30deg) !important;
    opacity: 0;
    pointer-events: none;
}

.card-genre-bar {
    height: 4px;
    flex-shrink: 0;
}

.card-content {
    padding: 1.2rem 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    overflow-y: auto;
    flex: 1;
}

.card-top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.card-genre-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.2rem 0.6rem;
    border-radius: 3px;
    background: rgba(0,0,0,0.05);
    color: inherit;
    font-weight: 700;
}

.card-trend {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: #999;
}

/* Now playing indicator on card */
.card-now-playing {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.8rem;
    background: rgba(0,0,0,0.03);
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: #888;
}

.eq-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
}

.eq-bar {
    width: 3px;
    background: currentColor;
    border-radius: 1px;
    animation: eqBounce 0.6s ease-in-out infinite alternate;
}

.eq-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
.eq-bar:nth-child(2) { height: 10px; animation-delay: 0.15s; }
.eq-bar:nth-child(3) { height: 4px; animation-delay: 0.3s; }
.eq-bar:nth-child(4) { height: 12px; animation-delay: 0.1s; }

@keyframes eqBounce {
    from { height: 3px; }
    to { height: 14px; }
}

.card-band-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 1.7rem;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.01em;
}

.card-stars {
    font-size: 1rem;
    letter-spacing: 0.05em;
}

.card-description {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    font-style: italic;
    line-height: 1.5;
    color: #555;
}

.card-advance {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: #999;
    padding-top: 0.2rem;
    border-top: 1px solid rgba(0,0,0,0.06);
}

.card-advance strong {
    color: var(--black);
    font-size: 0.9rem;
}

/* ─── Swipe overlays (SIGNED / PASS stamps) ─── */
.swipe-overlay {
    position: absolute;
    top: 50%;
    font-family: 'Space Mono', monospace;
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 0.3rem 1rem;
    border: 5px solid;
    border-radius: 8px;
    opacity: 0;
    pointer-events: none;
    z-index: 5;
}

.swipe-overlay.sign {
    right: 1.5rem;
    color: var(--green);
    border-color: var(--green);
    transform: translateY(-50%) rotate(-15deg);
}

.swipe-overlay.pass {
    left: 1.5rem;
    color: var(--red);
    border-color: var(--red);
    transform: translateY(-50%) rotate(15deg);
}

/* ─── EVENT CARDS ─── */
.card-event-icon {
    font-size: 2rem;
    text-align: center;
}

.card-event-type {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    text-align: center;
    color: #888;
}

.card-event-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
}

.card-event-body {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    line-height: 1.5;
    color: #555;
    text-align: center;
}

.card-event-flavor {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-style: italic;
    color: #aaa;
    text-align: center;
}

/* ─── PITCHFORK REVIEW CARD ─── */
.pitchfork-header {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    color: #666;
}

.pitchfork-score {
    font-family: 'DM Sans', sans-serif;
    font-size: 3.5rem;
    font-weight: 700;
    text-align: center;
    line-height: 1;
}

.pitchfork-score-line {
    width: 60%;
    margin: 0 auto;
    height: 2px;
    background: var(--black);
}

.pitchfork-bnm {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    text-align: center;
    color: var(--red);
    font-weight: 700;
}

.pitchfork-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    font-style: italic;
    line-height: 1.5;
    color: #555;
    text-align: center;
}

.pitchfork-band {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    text-align: center;
    color: #999;
}

/* ─── YEAR TRANSITION CARD ─── */
.year-card-year {
    font-family: 'Space Mono', monospace;
    font-size: 3rem;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.1em;
}

.year-card-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    line-height: 1.6;
    color: #555;
    text-align: center;
}

.year-card-trend {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: #999;
    text-align: center;
    font-style: italic;
}

/* ─── BUTTON HINTS ─── */
.button-hints {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem 2rem 0.3rem;
    flex-shrink: 0;
}

.hint-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.6rem 1.5rem;
    border: 2px solid;
    border-radius: 8px;
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 100px;
    text-align: center;
}

.hint-btn.pass-btn {
    color: var(--red);
    border-color: var(--red);
}

.hint-btn.pass-btn:hover {
    background: var(--red);
    color: white;
}

.hint-btn.sign-btn {
    color: var(--green);
    border-color: var(--green);
}

.hint-btn.sign-btn:hover {
    background: var(--green);
    color: white;
}

.hint-btn:active {
    transform: scale(0.95);
}

/* ─── NOW PLAYING BAR ─── */
.now-playing-bar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 1rem;
    background: rgba(26, 26, 26, 0.04);
    border-top: 1px solid rgba(0,0,0,0.06);
    flex-shrink: 0;
    min-height: 42px;
}

.np-eq {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 12px;
    color: var(--red);
}

.np-eq .eq-bar {
    width: 2px;
}

.np-info {
    flex: 1;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.np-info strong {
    color: var(--black);
}

.np-progress-outer {
    width: 60px;
    height: 4px;
    background: rgba(0,0,0,0.08);
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
}

.np-progress-inner {
    height: 100%;
    background: var(--red);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s linear;
}

/* ─── GAME OVER ─── */
#game-over-screen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    z-index: 1000;
    background: var(--cream);
    padding: 2rem;
    overflow-y: auto;
    padding-top: calc(2rem + var(--safe-top));
    padding-bottom: calc(2rem + var(--safe-bottom));
}

#game-over-screen.active {
    display: flex;
}

.go-vinyl {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    margin-top: 1rem;
}

.go-vinyl .vinyl-record {
    width: 32px;
    height: 32px;
    margin: 0;
}

.go-vinyl .vinyl-record::after {
    width: 10px;
    height: 10px;
}

.go-header-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
}

.go-label-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.2rem;
    text-align: center;
}

.go-era {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: #999;
    margin-bottom: 1.5rem;
}

.go-line {
    width: 200px;
    height: 1px;
    background: rgba(0,0,0,0.15);
    margin-bottom: 1.5rem;
}

.go-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem 2rem;
    margin-bottom: 1.5rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
}

.go-stat-label {
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-align: right;
}

.go-stat-value {
    font-weight: 700;
}

.go-legacy-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #999;
    margin-bottom: 0.3rem;
}

.go-legacy {
    font-family: 'DM Sans', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    text-align: center;
    color: var(--red);
}

.go-moments {
    width: 100%;
    max-width: 320px;
    margin-bottom: 1.5rem;
}

.go-moments-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #999;
    margin-bottom: 0.5rem;
}

.go-moment {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: #666;
    padding: 0.25rem 0;
    line-height: 1.4;
}

.go-buttons {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
}

.go-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.8rem 2rem;
    border: 2px solid var(--black);
    background: transparent;
    color: var(--black);
    cursor: pointer;
    transition: all 0.15s;
}

.go-btn:hover {
    background: var(--black);
    color: var(--cream);
}

.go-btn.primary {
    background: var(--black);
    color: var(--cream);
}

.go-btn.primary:hover {
    background: transparent;
    color: var(--black);
}

.go-copied {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--green);
    margin-top: 0.5rem;
    opacity: 0;
    transition: opacity 0.3s;
}

.go-copied.show {
    opacity: 1;
}

/* Game over message (for early exits) */
.go-message {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    color: var(--red);
    text-align: center;
    line-height: 1.5;
    margin-bottom: 1rem;
    max-width: 300px;
    font-style: italic;
}

/* ─── TOAST NOTIFICATIONS ─── */
.toast {
    position: fixed;
    top: 50%;
    left: 50%;

// ═══ UTILITY ═══
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function randRange(lo, hi) { return Math.floor(Math.random() * (hi - lo + 1)) + lo; }

// ═══ AUDIO ═══
function stopAudio(fadeMs) {
    if (fadeMs === undefined) fadeMs = 500;
    return new Promise(function(resolve) {
        if (!currentAudio) { resolve(); return; }
        if (fadeMs <= 0) {
            try { currentAudio.pause(); } catch(e) {}
            currentAudio = null;
            resolve();
            return;
        }
        var audio = currentAudio;
        var startVol = audio.volume;
        var steps = 10;
        var stepTime = fadeMs / steps;
        var step = 0;
        var fade = setInterval(function() {
            step++;
            try { audio.volume = Math.max(0, startVol * (1 - step / steps)); } catch(e) {}
            if (step >= steps) {
                clearInterval(fade);
                try { audio.pause(); } catch(e) {}
                if (currentAudio === audio) currentAudio = null;
                resolve();
            }
        }, stepTime);
    });
}

function playAudio(url) {
    stopAudio(300).then(function() {
        try {
            var audio = new Audio(url);
            audio.volume = 0.8;
            audio.loop = true;
            currentAudio = audio;
            var p = audio.play();
            if (p && p.catch) p.catch(function() {});
        } catch(e) {}
        updateNowPlaying();
    });
}

function updateNowPlaying() {
    if (npInterval) clearInterval(npInterval);
    var npProgress = document.getElementById('np-progress');
    var npEq = document.getElementById('np-eq');

    if (!currentAudio) {
        npProgress.style.width = '0%';
        npEq.style.display = 'none';
        return;
    }
    npEq.style.display = 'flex';
    npInterval = setInterval(function() {
        if (!currentAudio) return;
        var dur = currentAudio.duration || 1;
        var cur = currentAudio.currentTime || 0;
        npProgress.style.width = (cur / dur * 100) + '%';
    }, 300);
}

// ═══ DECK BUILDING ═══
function buildDeck() {
    var genres = Object.keys(SONG_LIBRARY);
    var bandPool = shuffle(BAND_NAMES.slice());
    var deck = [];
    var bandIdx = 0;

    for (var yi = 0; yi < 6; yi++) {
        var yearInfo = YEAR_DATA[yi];
        // Year intro
        deck.push({ type: 'year', year: yearInfo.year, intro: yearInfo.intro, trend: yearInfo.trend });

        for (var bi = 0; bi < 5; bi++) {
            var name = bandPool[bandIdx % bandPool.length];
            bandIdx++;
            var genre = pick(genres);
            var talent = randRange(1, 5);
            var advance = Math.round((talent * 400 + randRange(-200, 300)) / 100) * 100;
            advance = Math.max(200, advance);
            var desc = pick(LOOK_DESCRIPTIONS[genre]);
            var song = pick(SONG_LIBRARY[genre]);
            var trendDir = Math.random() < 0.4 ? (Math.random() < 0.5 ? '\u2191 trending' : '\u2193 fading') : '';

            deck.push({
                type: 'band', name: name, genre: genre, talent: talent,
                advance: advance, description: desc, song: song,
                trend: trendDir, year: yearInfo.year
            });

            // Drama after 3rd band of each year (except year 0)
            if (bi === 2 && yi > 0) {
                deck.push(buildDramaCard());
            }
            // Industry or drama after 5th band
            if (bi === 4 && yi < 5) {
                if (Math.random() < 0.45 && yi >= 1) {
                    deck.push(buildIndustryCard(yi));
                } else {
                    deck.push(buildDramaCard());
                }
            }
        }
    }
    return deck;
}

function buildDramaCard() {
    var event = DRAMA_EVENTS[Math.floor(Math.random() * DRAMA_EVENTS.length)];
    return { type: 'drama', text: event.text, left: { label: event.left.label, effects: Object.assign({}, event.left.effects) }, right: { label: event.right.label, effects: Object.assign({}, event.right.effects) }, needsBand: !!event.needsBand };
}

function buildIndustryCard(yearIndex) {
    var pool;
    if (yearIndex >= 4) {
        pool = INDUSTRY_OFFERS;
    } else {
        pool = INDUSTRY_OFFERS.filter(function(o) { return o.title !== 'MAJOR LABEL BUYOUT'; });
    }
    var offer = pool[Math.floor(Math.random() * pool.length)];
    return {
        type: 'industry', title: offer.title, text: offer.text, flavor: offer.flavor || '',
        left: { label: offer.left.label, effects: Object.assign({}, offer.left.effects) },
        right: { label: offer.right.label, effects: Object.assign({}, offer.right.effects) }
    };
}

// ═══ METERS ═══
function updateMeters(changes, animate) {
    if (changes.budget !== undefined) state.budget = clamp(state.budget + changes.budget, 0, 100);
    if (changes.credibility !== undefined) state.credibility = clamp(state.credibility + changes.credibility, 0, 100);
    if (changes.hype !== undefined) state.hype = clamp(state.hype + changes.hype, 0, 100);
    if (changes._decay) state.hype = clamp(state.hype - 1, 0, 100);

    renderMeters(!!animate, changes);
    checkGameOver();
}

function renderMeters(animate, changes) {
    changes = changes || {};
    var budgetBar = document.getElementById('meter-budget');
    var credBar = document.getElementById('meter-cred');
    var hypeBar = document.getElementById('meter-hype');

    budgetBar.style.width = state.budget + '%';
    credBar.style.width = state.credibility + '%';
    hypeBar.style.width = state.hype + '%';
    budgetBar.style.background = meterColor(state.budget);
    credBar.style.background = meterColor(state.credibility);
    hypeBar.style.background = meterColor(state.hype);

    document.getElementById('meter-budget-val').textContent = state.budget;
    document.getElementById('meter-cred-val').textContent = state.credibility;
    document.getElementById('meter-hype-val').textContent = state.hype;

    if (animate) {
        if (changes.budget) pulseBar(budgetBar);
        if (changes.credibility) pulseBar(credBar);
        if (changes.hype) pulseBar(hypeBar);
        if (changes.budget) floatChange('budget', changes.budget);
        if (changes.credibility) floatChange('cred', changes.credibility);
        if (changes.hype) floatChange('hype', changes.hype);
    }
}

function meterColor(val) {
    if (val <= 15 || val >= 85) return '#B85450';
    if (val <= 25 || val >= 75) return '#C49B3F';
    return val <= 50 ? '#4A7C59' : '#4A6B8A';
}

function pulseBar(el) {
    el.classList.remove('pulse');
    void el.offsetWidth;
    el.classList.add('pulse');
}

function floatChange(meterId, amount) {
    var meterEl = document.getElementById('meter-' + meterId);
    if (!meterEl) return;
    var rect = meterEl.getBoundingClientRect();
    var indicator = document.createElement('div');
    indicator.className = 'meter-change';
    indicator.textContent = (amount > 0 ? '+' : '') + amount;
    indicator.style.color = amount > 0 ? '#4A7C59' : '#B85450';
    indicator.style.left = (rect.left + rect.width / 2) + 'px';
    indicator.style.top = (rect.bottom + 4) + 'px';
    document.body.appendChild(indicator);
    setTimeout(function() { indicator.remove(); }, 1300);
}

function checkGameOver() {
    if (state.gameOver) return;
    var msg = null;
    if (state.budget <= 0) msg = GAME_OVER_MESSAGES.budget_zero;
    else if (state.budget >= 100) msg = GAME_OVER_MESSAGES.budget_max;
    else if (state.credibility <= 0) msg = GAME_OVER_MESSAGES.cred_zero;
    else if (state.credibility >= 100) msg = GAME_OVER_MESSAGES.cred_max;
    else if (state.hype <= 0) msg = GAME_OVER_MESSAGES.hype_zero;
    else if (state.hype >= 100) msg = GAME_OVER_MESSAGES.hype_max;

    if (msg) {
        state.gameOver = true;
        setTimeout(function() { endGame(msg); }, 600);
    }
}

// ═══ CARD RENDERING ═══
function renderCard(cardData) {
    // Clean up previous card listeners
    if (activeCardCleanup) {
        activeCardCleanup();
        activeCardCleanup = null;
    }

    var area = document.getElementById('card-area');
    area.innerHTML = '';

    var card = document.createElement('div');
    card.className = 'card';
    var baseRotation = (Math.random() * 4 - 2);
    card.style.transform = 'rotate(' + baseRotation.toFixed(1) + 'deg)';

    var leftLabel = document.getElementById('btn-left');
    var rightLabel = document.getElementById('btn-right');

    if (cardData.type === 'band') {
        renderBandCard(card, cardData);
        leftLabel.innerHTML = '\u2190 PASS';
        rightLabel.innerHTML = 'SIGN \u2192';
        playAudio(cardData.song);
        document.getElementById('np-info').innerHTML = '<strong>' + escHtml(cardData.name) + '</strong> \u2014 ' + cardData.genre;
    } else if (cardData.type === 'pitchfork') {
        renderPitchforkCard(card, cardData);
        leftLabel.innerHTML = '\u2190 Cool';
        rightLabel.innerHTML = 'Share \u2192';
    } else if (cardData.type === 'drama') {
        renderDramaCard(card, cardData);
        leftLabel.innerHTML = '\u2190 ' + escHtml(cardData.left.label);
        rightLabel.innerHTML = escHtml(cardData.right.label) + ' \u2192';
    } else if (cardData.type === 'industry') {
        renderIndustryCard(card, cardData);
        leftLabel.innerHTML = '\u2190 ' + escHtml(cardData.left.label);
        rightLabel.innerHTML = escHtml(cardData.right.label) + ' \u2192';
    } else if (cardData.type === 'year') {
        renderYearCard(card, cardData);
        leftLabel.innerHTML = '';
        rightLabel.innerHTML = 'Continue \u2192';
        stopAudio(500);
        document.getElementById('np-info').innerHTML = '...';
        document.getElementById('np-eq').style.display = 'none';
    }

    // Swipe overlays
    var signOverlay = document.createElement('div');
    signOverlay.className = 'swipe-overlay sign';
    signOverlay.textContent = cardData.type === 'band' ? 'SIGNED' : (cardData.right ? cardData.right.label.toUpperCase() : 'OK');

    var passOverlay = document.createElement('div');
    passOverlay.className = 'swipe-overlay pass';
    passOverlay.textContent = cardData.type === 'band' ? 'PASS' : (cardData.left ? cardData.left.label.toUpperCase() : 'SKIP');

    card.appendChild(signOverlay);
    card.appendChild(passOverlay);
    area.appendChild(card);

    if (cardData.year) {
        document.getElementById('game-year').textContent = monthName() + ' ' + cardData.year;
    }

    setupSwipe(card, signOverlay, passOverlay, cardData, baseRotation);
}

// ═══ SWIPE MECHANICS ═══
function setupSwipe(card, signOverlay, passOverlay, cardData, baseRotation) {
    var startX = 0, currentX = 0, isDragging = false;
    var dismissed = false;

    function onPointerDown(e) {
        if (state.gameOver || dismissed) return;
        e.preventDefault();
        card.setPointerCapture(e.pointerId);
        startX = e.clientX;
        currentX = 0;
        isDragging = true;
        card.classList.add('swiping');
    }

    function onPointerMove(e) {
        if (!isDragging || dismissed) return;
        e.preventDefault();
        currentX = e.clientX - startX;
        var rotation = baseRotation + currentX * 0.08;
        var opacity = Math.min(Math.abs(currentX) / 120, 1);

        card.style.transform = 'translateX(' + currentX + 'px) rotate(' + rotation + 'deg)';

        if (currentX > 40) {
            signOverlay.style.opacity = opacity;
            passOverlay.style.opacity = 0;
        } else if (currentX < -40) {
            passOverlay.style.opacity = opacity;
            signOverlay.style.opacity = 0;
        } else {
            signOverlay.style.opacity = 0;
            passOverlay.style.opacity = 0;
        }
    }

    function onPointerUp(e) {
        if (!isDragging || dismissed) return;
        e.preventDefault();
        isDragging = false;
        card.classList.remove('swiping');

        var threshold = window.innerWidth * 0.22;
        if (currentX > threshold) {
            doDismiss('right');
        } else if (currentX < -threshold) {
            doDismiss('left');
        } else {
            card.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
            card.style.transform = 'rotate(' + baseRotation + 'deg)';
            signOverlay.style.opacity = 0;
            passOverlay.style.opacity = 0;
            setTimeout(function() { card.style.transition = ''; }, 300);
        }
    }

    function onPointerCancel() {
        isDragging = false;
        card.classList.remove('swiping');
        card.style.transition = 'transform 0.3s ease';
        card.style.transform = 'rotate(' + baseRotation + 'deg)';
        signOverlay.style.opacity = 0;
        passOverlay.style.opacity = 0;
    }

    function doDismiss(direction) {
        if (dismissed) return;
        dismissed = true;
        cleanup();
        card.classList.add(direction === 'right' ? 'dismissed-right' : 'dismissed-left');
        processCardAction(cardData, direction);
        setTimeout(advanceToNextCard, 420);
    }

    function onKeyDown(e) {
        if (state.gameOver || dismissed) return;
        if (e.key === 'ArrowRight' || e.key === 'd') { doDismiss('right'); }
        else if (e.key === 'ArrowLeft' || e.key === 'a') { doDismiss('left'); }
    }

    function onLeftBtn() { if (!dismissed) doDismiss('left'); }
    function onRightBtn() { if (!dismissed) doDismiss('right'); }

    card.addEventListener('pointerdown', onPointerDown);
    card.addEventListener('pointermove', onPointerMove);
    card.addEventListener('pointerup', onPointerUp);
    card.addEventListener('pointercancel', onPointerCancel);
    document.addEventListener('keydown', onKeyDown);

    var btnLeft = document.getElementById('btn-left');
    var btnRight = document.getElementById('btn-right');
    btnLeft.addEventListener('click', onLeftBtn);
    btnRight.addEventListener('click', onRightBtn);

    function cleanup() {
        document.removeEventListener('keydown', onKeyDown);
        btnLeft.removeEventListener('click', onLeftBtn);
        btnRight.removeEventListener('click', onRightBtn);
    }

    activeCardCleanup = cleanup;
}

// ═══ CARD ACTIONS ═══
function processCardAction(cardData, direction) {
    if (cardData.type === 'band') {
        if (direction === 'right') {
            signBand(cardData);
        } else {
            state.bandsPassed++;
            state.lastPassedBand = cardData.name;
            showToast('Passed on ' + cardData.name);
        }
        updateMeters({ _decay: true });

    } else if (cardData.type === 'pitchfork') {
        if (direction === 'right') {
            updateMeters({ hype: 5 }, true);
            showToast('Shared the review everywhere');
        }

    } else if (cardData.type === 'drama') {
        var choice = direction === 'right' ? cardData.right : cardData.left;
        updateMeters(choice.effects, true);
        showToast(choice.label + ': ' + formatEffects(choice.effects));

    } else if (cardData.type === 'industry') {
        var ichoice = direction === 'right' ? cardData.right : cardData.left;
        if (ichoice.effects.sellout) {
            state.tookSellout = true;
            state.gameOver = true;
            state.moments.push('Sold the label to a major');
            setTimeout(function() { endGame(GAME_OVER_MESSAGES.sellout); }, 400);
            return;
        }
        updateMeters(ichoice.effects, true);
        if (direction === 'left' && cardData.title) {
            state.declinedOffers.push(cardData.title);
        }
        if (direction === 'right' && cardData.title) {
            state.moments.push('Accepted the ' + cardData.title);
        }
        showToast(ichoice.label + ': ' + formatEffects(ichoice.effects));
    }
}

function signBand(data) {
    state.bandsSigned++;
    state.roster.push({ name: data.name, genre: data.genre, talent: data.talent, advance: data.advance });

    var budgetCost = Math.round(data.advance / 50) * -1;
    var hypeGain = Math.round(data.talent * 2 + randRange(0, 5));
    var credGain = data.talent >= 4 ? randRange(2, 5) : (data.talent <= 2 ? randRange(-3, 0) : 0);

    updateMeters({ budget: budgetCost, hype: hypeGain, credibility: credGain }, true);
    showToast('Signed ' + data.name + '! -$' + data.advance.toLocaleString());

    if (Math.random() < 0.55) {
        schedulePitchforkReview(data);
    }
}

function schedulePitchforkReview(bandData) {
    var talent = bandData.talent;
    var score;
    if (talent >= 5) score = 7.5 + Math.random() * 2.5;
    else if (talent >= 4) score = 6.5 + Math.random() * 2.5;
    else if (talent >= 3) score = 5.0 + Math.random() * 3.0;
    else if (talent >= 2) score = 3.0 + Math.random() * 3.0;
    else score = 1.5 + Math.random() * 3.5;
    score = Math.round(score * 10) / 10;
    score = Math.min(9.8, Math.max(0.8, score));

    var templates;
    if (score >= 8.5) templates = PITCHFORK_REVIEWS.high;
    else if (score >= 7.0) templates = PITCHFORK_REVIEWS.good;
    else if (score >= 5.0) templates = PITCHFORK_REVIEWS.mid;
    else if (score >= 3.0) templates = PITCHFORK_REVIEWS.low;
    else templates = PITCHFORK_REVIEWS.terrible;

    var review = pick(templates).replace(/BAND/g, bandData.name);

    var reviewCard = {
        type: 'pitchfork', band: bandData.name, score: score,
        review: review, isBNM: score >= 8.5
    };

    // Apply review effects
    if (score >= 8.5) {
        state.bnmCount++;
        state.moments.push(bandData.name + ' got ' + score.toFixed(1) + ' \u2014 Best New Music');
        updateMeters({ credibility: 10, hype: 8 }, true);
    } else if (score >= 7.0) {
        updateMeters({ credibility: 5, hype: 3 }, true);
    } else if (score >= 5.0) {
        updateMeters({ credibility: -2 }, true);
    } else {
        state.moments.push(bandData.name + ' got ' + score.toFixed(1) + ' \u2014 ouch');
        updateMeters({ credibility: -8, hype: -5 }, true);
    }
    state.pitchforkScores.push(score);

    // Insert review 1-2 cards ahead
    var insertAt = state.cardIndex + randRange(1, 2);
    if (insertAt < state.deck.length) {
        state.deck.splice(insertAt, 0, reviewCard);
    } else {
        state.deck.push(reviewCard);
    }
}

function formatEffects(effects) {
    var parts = [];
    if (effects.budget) parts.push((effects.budget > 0 ? '+' : '') + effects.budget + ' budget');
    if (effects.credibility) parts.push((effects.credibility > 0 ? '+' : '') + effects.credibility + ' cred');
    if (effects.hype) parts.push((effects.hype > 0 ? '+' : '') + effects.hype + ' hype');
    return parts.join(', ') || 'no effect';
}

// ═══ TOAST ═══
function showToast(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.remove('show');
    void toast.offsetWidth;
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 1800);
}

// ═══ GAME FLOW ═══
function advanceToNextCard() {
    if (state.gameOver) return;
    state.cardIndex++;

    if (state.cardIndex >= state.deck.length) {
        endGame(null);
        return;
    }

    var cardData = state.deck[state.cardIndex];

    // Resolve BAND references in drama cards
    if (cardData.type === 'drama') {
        if (cardData.needsBand || cardData.text.indexOf('BAND') !== -1) {
            if (state.roster.length > 0) {
                var band = pick(state.roster);
                cardData.text = cardData.text.replace(/BAND/g, band.name);
            } else if (cardData.needsBand) {
                // Skip drama if no bands signed yet
                advanceToNextCard();
                return;
            }
        }
    }

    renderCard(cardData);
}

// ═══ GAME OVER / END SCREEN ═══
function endGame(earlyMessage) {
    state.gameOver = true;
    if (activeCardCleanup) { activeCardCleanup(); activeCardCleanup = null; }
    stopAudio(800);

    document.getElementById('game-screen').classList.remove('active');
    var goScreen = document.getElementById('game-over-screen');
    goScreen.classList.add('active');
    document.getElementById('go-label-name').textContent = state.labelName;

    var goMsg = document.getElementById('go-message');
    if (earlyMessage) {
        goMsg.textContent = earlyMessage;
        goMsg.style.display = 'block';
    } else {
        goMsg.style.display = 'none';
    }

    var avgPF = state.pitchforkScores.length > 0
        ? (state.pitchforkScores.reduce(function(a, b) { return a + b; }, 0) / state.pitchforkScores.length).toFixed(1)
        : 'N/A';

    document.getElementById('go-stats').innerHTML =
        '<span class="go-stat-label">Bands Signed</span><span class="go-stat-value">' + state.bandsSigned + '</span>' +
        '<span class="go-stat-label">Best New Music</span><span class="go-stat-value">' + state.bnmCount + '</span>' +
        '<span class="go-stat-label">Pitchfork Avg</span><span class="go-stat-value">' + avgPF + '</span>' +
        '<span class="go-stat-label">Budget</span><span class="go-stat-value">' + state.budget + '</span>' +
        '<span class="go-stat-label">Credibility</span><span class="go-stat-value">' + state.credibility + '</span>' +
        '<span class="go-stat-label">Hype</span><span class="go-stat-value">' + state.hype + '</span>';

    var legacy = computeLegacy();
    document.getElementById('go-legacy').textContent = '\u201C' + legacy + '\u201D';

    // Build moments list
    if (state.declinedOffers.length > 0) {
        state.moments.push('Turned down ' + state.declinedOffers[0]);
    }
    if (state.bandsPassed > state.bandsSigned && state.bandsSigned > 0) {
        state.moments.push('Passed on more bands than you signed');
    }
    if (state.roster.length > 0) {
        var topBand = state.roster.reduce(function(best, b) { return b.talent > best.talent ? b : best; }, state.roster[0]);
        state.moments.push('Best signing: ' + topBand.name + ' (' + renderStars(topBand.talent) + ')');
    }
    if (state.moments.length === 0) {
        state.moments.push('Kept a low profile');
    }

    // Deduplicate
    var seen = {};
    var uniqueMoments = state.moments.filter(function(m) {
        if (seen[m]) return false;
        seen[m] = true;
        return true;
    });

    document.getElementById('go-moments').innerHTML = uniqueMoments.slice(0, 5).map(function(m) {
        return '<div class="go-moment">\u2022 ' + escHtml(m) + '</div>';
    }).join('');

    saveHighScore(legacy);

    goScreen._shareText = 'I built ' + state.labelName + ' to \u201C' + legacy + '\u201D status \u2014 ' +
        state.bandsSigned + ' bands, ' + state.bnmCount + ' Best New Music picks, ' +
        state.credibility + ' credibility. Can you keep it more real? #MatadorDreams';
}

function computeLegacy() {
    if (state.tookSellout) return 'Sold Out';
    var cred = state.credibility;
    var bnm = state.bnmCount;
    var neverSoldOut = state.declinedOffers.length > 0;

    if (bnm >= 5 && cred >= 90 && neverSoldOut) return 'True Legend';
    if (bnm >= 4 && cred >= 80) return 'The Next Sub Pop';
    if (bnm >= 3 && cred >= 60) return 'Indie Darling';
    if (bnm >= 2 && cred >= 40) return 'Reliable Label';
    if (bnm >= 1 && cred < 40) return 'One-Hit Wonder';
    if (cred < 20) return 'Sold Out';
    if (state.bandsSigned === 0) return 'A&R Coward';
    return 'Forgettable But Honest';
}

function saveHighScore(legacy) {
    try {
        var scores = JSON.parse(localStorage.getItem('matador-dreams-scores') || '[]');
        scores.push({
            label: state.labelName, legacy: legacy, bands: state.bandsSigned,
            bnm: state.bnmCount, cred: state.credibility, date: new Date().toISOString()
        });
        scores.sort(function(a, b) { return b.cred - a.cred; });
        localStorage.setItem('matador-dreams-scores', JSON.stringify(scores.slice(0, 10)));
    } catch(e) {}
}

// ═══ INIT ═══
function resetState() {
    return {
        labelName: '',
        budget: 60,
        credibility: 50,
        hype: 30,
        roster: [],
        currentYear: 0,
        cardIndex: -1,
        deck: [],
        bandsSigned: 0,
        bandsPassed: 0,
        bnmCount: 0,
        pitchforkScores: [],
        moments: [],
        tookSellout: false,
        declinedOffers: [],
        gameOver: false,
        lastPassedBand: null
    };
}

function initGame() {
    var labelName = document.getElementById('label-name-input').value.trim() || 'Sad Horse Records';
    state = resetState();
    state.labelName = labelName;
    state.deck = buildDeck();

    document.getElementById('title-screen').classList.add('hidden');
    setTimeout(function() {
        document.getElementById('title-screen').style.display = 'none';
        var gameScreen = document.getElementById('game-screen');
        gameScreen.classList.add('active');
        document.getElementById('game-label-name').textContent = state.labelName;
        renderMeters(false, {});
        advanceToNextCard();
    }, 500);
}

// ═══ EVENT LISTENERS ═══
document.getElementById('start-btn').addEventListener('click', initGame);
document.getElementById('label-name-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') initGame();
});

document.getElementById('go-play-again').addEventListener('click', function() {
    stopAudio(0);
    if (activeCardCleanup) { activeCardCleanup(); activeCardCleanup = null; }
    document.getElementById('game-over-screen').classList.remove('active');
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('card-area').innerHTML = '';
    var titleScreen = document.getElementById('title-screen');
    titleScreen.style.display = '';
    void titleScreen.offsetWidth;
    titleScreen.classList.remove('hidden');
    document.getElementById('label-name-input').value = '';
    document.getElementById('label-name-input').focus();
});

document.getElementById('go-share').addEventListener('click', function() {
    var goScreen = document.getElementById('game-over-screen');
    var text = goScreen._shareText || 'I played Matador Dreams!';
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
            var copied = document.getElementById('go-copied');
            copied.classList.add('show');
            setTimeout(function() { copied.classList.remove('show'); }, 2000);
        }).catch(function() {});
    } else {
        // Fallback
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch(e) {}
        document.body.removeChild(ta);
        var copied = document.getElementById('go-copied');
        copied.classList.add('show');
        setTimeout(function() { copied.classList.remove('show'); }, 2000);
    }
});

// Focus input on load
window.addEventListener('load', function() {
    document.getElementById('label-name-input').focus();
});
</script>
</body>
