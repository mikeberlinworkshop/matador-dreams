// ---- UI Rendering ----
function renderAll() {
  renderHeader();
  renderResources();
  renderRoster();
  renderActionButtons();
}

function renderHeader() {
  document.getElementById('header-label-name').textContent = state.labelName;
  document.getElementById('header-date').textContent = getDateStr();
  const actionsEl = document.getElementById('actions-display');
  let html = '<span>Actions:</span>';
  for (let i = 0; i < 3; i++) {
    html += `<div class="action-dot ${i < state.actionsLeft ? '' : 'spent'}"></div>`;
  }
  actionsEl.innerHTML = html;
}

function renderResources() {
  document.getElementById('budget-val').textContent = '$' + state.budget.toLocaleString();
  document.getElementById('cred-val').textContent = state.credibility;
  document.getElementById('hype-val').textContent = state.hype;
  const maxBudget = 50000;
  document.getElementById('budget-bar').style.width = clamp(state.budget / maxBudget * 100, 0, 100) + '%';
  document.getElementById('cred-bar').style.width = clamp(state.credibility, 0, 100) + '%';
  document.getElementById('hype-bar').style.width = clamp(state.hype, 0, 100) + '%';
}

function renderRoster() {
  const el = document.getElementById('roster-list');
  let html = '';
  for (let i = 0; i < 5; i++) {
    if (i < state.roster.length) {
      const band = state.roster[i];
      const trendVal = getTrendValue(band.genre);
      const trendClass = trendVal >= 0.8 ? 'trend-hot' : trendVal >= 0.5 ? 'trend-warm' : trendVal >= 0.3 ? 'trend-cool' : 'trend-cold';
      html += `<div class="band-card ${i === selectedBandIndex ? 'selected' : ''}" onclick="selectBand(${i})">
        <div class="band-name">${band.name}</div>
        <div class="band-genre">${band.genre} <span class="trend-indicator ${trendClass}" title="Trend: ${Math.round(trendVal*100)}%"></span></div>
        <div class="band-stars">${renderStars(band.talent)}</div>
        <div class="band-morale">Morale</div>
        <div class="morale-bar"><div class="morale-fill" style="width:${band.morale}%; background:${band.morale > 50 ? 'var(--sage)' : band.morale > 25 ? 'var(--mustard)' : 'var(--faded-red)'}"></div></div>
        <div style="font-size:0.65rem; color:#888; margin-top:2px;">Fans: ${band.fanBase} | Albums: ${band.albums.length}</div>
      </div>`;
    } else {
      html += `<div class="empty-slot">--- empty slot ---</div>`;
    }
  }
  el.innerHTML = html;
}

function renderStars(talent) {
  const full = Math.round(talent / 2);
  let s = '';
  for (let i = 0; i < 5; i++) s += i < full ? '\u2605' : '\u2606';
  return s;
}

function getTrendValue(genre) {
  const year = getYear();
  return (trends[year] && trends[year][genre]) || 0.3;
}

function renderActionButtons() {
  const hasBands = state.roster.length > 0;
  document.getElementById('btn-record').disabled = !hasBands;
  document.getElementById('btn-book').disabled = !hasBands;
  document.getElementById('btn-promote').disabled = !hasBands;
}

function selectBand(index) {
  selectedBandIndex = index;
  renderRoster();
  if (currentAction === 'record-select' || currentAction === 'book-select' || currentAction === 'promote-select') {
    if (currentAction === 'record-select') showRecordOptions();
    else if (currentAction === 'book-select') showBookOptions();
    else if (currentAction === 'promote-select') showPromoteOptions();
  }
}

function setActionPanel(title, html) {
  document.getElementById('action-panel-title').textContent = title;
  document.getElementById('action-content').innerHTML = html;
}

function addHistory(text) {
  state.history.push({ date: getDateStr(), text });
  const el = document.getElementById('history-log');
  const entry = document.createElement('div');
  entry.className = 'history-entry';
  entry.innerHTML = `<span class="h-date">${getDateStr()}</span> ${text}`;
  el.insertBefore(entry, el.firstChild);
}

function useAction() {
  if (state.actionsLeft <= 0) return false;
  state.actionsLeft--;
  renderHeader();
  return true;
}

// ---- Modal ----
function showModal(title, body, buttons) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  const btnEl = document.getElementById('modal-buttons');
  btnEl.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'btn ' + (b.class || '');

      document.getElementById('modal-overlay').classList.remove('active');

// ---- Generate Band ----
function generateBand() {
  const genre = pick(GENRES);
  const talent = randInt(3, 10);
  const energy = randInt(3, 10);
  const genreKeys = GENRE_KEYS_MAP[genre] || KEYS;
  return {
    name: generateBandName(),
    genre: genre,
    talent: talent,
    ego: randInt(1, 10),
    authenticity: randInt(4, 10),
    drama: randInt(1, 10),
    energy: energy,
    look: generateLook(genre),
    musicParams: { genre, key: pick(genreKeys), tempo: randInt(GENRE_TEMPOS[genre][0], GENRE_TEMPOS[genre][1]), energy, talent, name: '' },
    albums: [],
    morale: 70,
    fanBase: randInt(0, 50),
  };
}

function getSigningCost(band) {
  return 500 + (band.talent - 3) * 200;
}

// ---- Actions ----

// SCOUT
function doScout() {
  if (state.actionsLeft <= 0) { showModal('No Actions Left', 'You have no actions left this month. Advance to the next month.', [{ label: 'OK' }]); return; }
  if (state.roster.length >= 5) { showModal('Roster Full', 'You already have 5 bands. Drop someone first or just enjoy the chaos.', [{ label: 'OK' }]); return; }

  currentAction = 'scout';
  const candidates = [generateBand(), generateBand(), generateBand()];
  const usedNames = new Set(state.roster.map(b => b.name));
  candidates.forEach(c => {
    while (usedNames.has(c.name)) { c.name = generateBandName(); }
    usedNames.add(c.name);
    c.musicParams.name = c.name;
  });

  let html = '<div style="margin-bottom:0.5rem; font-family:var(--font-mono); font-size:0.8rem; color:#666;">Three bands want your attention. Listen, then pick one to sign (or pass).</div>';

  candidates.forEach((band, i) => {
    const cost = getSigningCost(band);
    const trendVal = getTrendValue(band.genre);
    const trendLabel = trendVal >= 0.8 ? 'HOT' : trendVal >= 0.5 ? 'warm' : trendVal >= 0.3 ? 'cool' : 'cold';
    const rot = (i - 1) * 1.2;

    html += `<div class="scout-card" style="--rot:${rot}deg">
      <div class="band-photo" style="background:${getGenreGradient(band.genre)};"></div>
      <div class="band-info">
        <div style="font-weight:800; font-size:0.95rem; text-transform:uppercase;">${band.name}</div>
        <div style="font-family:var(--font-mono); font-size:0.75rem; color:var(--denim);">${band.genre} <span style="font-size:0.65rem; color:${trendVal >= 0.7 ? 'var(--faded-red)' : '#888'};">[${trendLabel}]</span></div>
        <div class="band-stars">${renderStars(band.talent)} <span style="font-size:0.65rem; color:#888;">Energy: ${band.energy}/10</span></div>
        <div class="look-desc">${band.look}</div>
        <div class="cost-tag">Advance: $${cost}</div>
        <div class="flex-row mt-1">
          <button class="btn btn-small btn-play" onclick="previewBand(${i})">Listen</button>
          <button class="btn btn-small" onclick="signBand(${i})" ${state.budget < cost ? 'disabled title="Not enough budget"' : ''}>Sign</button>
        </div>
      </div>
    </div>`;
  });

  html += `<button class="btn btn-small" onclick="passOnAll()" style="margin-top:0.5rem;">Pass on all</button>`;
  setActionPanel('Scouting', html);
  window._scoutCandidates = candidates;
}

function getGenreGradient(genre) {
  const gradients = {
    'post-punk': 'linear-gradient(135deg, #222 0%, #555 50%, #222 100%)',
    'indie-folk': 'linear-gradient(135deg, #7A8B6F 0%, #C49B3F 100%)',
    'shoegaze': 'linear-gradient(135deg, #b8a9c9 0%, #d4c5e2 50%, #e8ddf0 100%)',
    'garage': 'linear-gradient(135deg, #B85450 0%, #C49B3F 100%)',
    'art-rock': 'linear-gradient(135deg, #4A6B8A 0%, #C4858C 50%, #C49B3F 100%)',
    'lo-fi': 'linear-gradient(135deg, #c9b99a 0%, #a39478 100%)',
    'dance-punk': 'linear-gradient(135deg, #C4858C 0%, #ff6b9d 50%, #C49B3F 100%)',
  };
  return gradients[genre] || gradients['post-punk'];
}

function previewBand(idx) {
  const band = window._scoutCandidates[idx];
  if (band) playBandMusic(band);

function signBand(idx) {
  const band = window._scoutCandidates[idx];

function recordAlbum(style, cost, prodBonus) {
  if (selectedBandIndex < 0) return;
  if (state.budget < cost) return;
  if (!useAction()) return;

  const band = state.roster[selectedBandIndex];
  state.budget -= cost;

  const albumName = generateAlbumName();
  const artCSS = generateAlbumArtCSS(band.genre, albumName);

  // Calculate Pitchfork score
  const trendVal = getTrendValue(band.genre);
  const baseScore = band.talent * 0.6 + prodBonus * 0.2 * 10 + trendVal * 10 * 0.2;
  const variance = (Math.random() - 0.5) * 3;
  const experimentalBonus = style === 'experimental' ? (Math.random() > 0.5 ? 1.5 : -1) : 0;
  const rawBonus = style === 'raw' ? (band.authenticity > 7 ? 0.5 : -0.5) : 0;
  const polishedPenalty = style === 'polished' ? -0.3 : 0;
  let finalScore = clamp(baseScore + variance + experimentalBonus + rawBonus + polishedPenalty, 0.0, 10.0);
  finalScore = Math.round(finalScore * 10) / 10;

  const album = {
    name: albumName,
    band: band.name,
    bandIndex: selectedBandIndex,
    genre: band.genre,
    score: finalScore,
    style: style,
    month: state.month,
    artCSS: artCSS,
    isBNM: finalScore >= 8.5,
  };

  band.albums.push(album);
  state.albums.push(album);

  // Effects
  const revenue = Math.round(finalScore * 100 + band.fanBase * 0.5);
  state.budget += revenue;
  band.fanBase += Math.round(finalScore * 20);

  if (album.isBNM) {
    state.credibility = clamp(state.credibility + 12, 0, 100);
    state.hype = clamp(state.hype + 15, 0, 100);
    band.morale = clamp(band.morale + 15, 0, 100);
    // BNM confetti!
    setTimeout(() => spawnConfetti(), 300);
  } else if (finalScore >= 7.0) {
    state.credibility = clamp(state.credibility + 5, 0, 100);
    state.hype = clamp(state.hype + 6, 0, 100);
    band.morale = clamp(band.morale + 8, 0, 100);
  } else if (finalScore >= 5.0) {
    state.hype = clamp(state.hype + 2, 0, 100);
    band.morale = clamp(band.morale + 2, 0, 100);
  } else {
    state.credibility = clamp(state.credibility - 3, 0, 100);
    band.morale = clamp(band.morale - 10, 0, 100);
  }

  const reviewText = generateReview(band, album, finalScore);
  const scoreColor = finalScore >= 8.5 ? 'var(--sage)' : finalScore >= 7.0 ? 'var(--denim)' : finalScore >= 5.0 ? 'var(--mustard)' : 'var(--faded-red)';

  let html = `<div class="flex-row" style="gap:1rem; align-items:flex-start;">
    <div class="album-art album-reveal" style="${artCSS}"></div>
    <div>
      <div style="font-style:italic; font-size:1.1rem; font-weight:700;">${albumName}</div>
      <div style="font-size:0.85rem; color:#666;">by ${band.name}</div>
      <div style="font-family:var(--font-mono); font-size:0.75rem; color:#888; margin-top:0.2rem;">${style} production | Revenue: +$${revenue}</div>
    </div>
  </div>`;

  // Review (50% chance, guaranteed for BNM or very low)
  if (Math.random() < 0.5 || album.isBNM || finalScore < 3.0) {
    html += `<div class="review-card">
      <div style="margin-bottom:0.5rem;">
        <span class="review-score" style="color:${scoreColor}">${finalScore.toFixed(1)}</span>
        ${album.isBNM ? '<span class="bnm">Best New Music</span>' : ''}
      </div>
      <div>${reviewText}</div>
      <div class="review-source">pitchforkmedia.com</div>
    </div>`;
  } else {
    html += `<div style="font-family:var(--font-mono); font-size:0.8rem; color:#888; margin-top:0.8rem;">No major review coverage this time.</div>`;
  }

  setActionPanel('Album Released!', html);
  addHistory(`Released "${albumName}" by ${band.name} (${finalScore.toFixed(1)}${album.isBNM ? ' BNM!' : ''})`);
  renderAll();
}

function bookVenue(venueIdx) {
  if (selectedBandIndex < 0) return;
  if (!useAction()) return;

  const band = state.roster[selectedBandIndex];
  const venue = venues[venueIdx];

  const energyFactor = band.energy / 10;
  const moraleFactor = band.morale / 100;
  const talentFactor = band.talent / 10;
  const success = (energyFactor * 0.4 + moraleFactor * 0.3 + talentFactor * 0.3) + (Math.random() - 0.5) * 0.3;

  let pay = venue.pay;
  let credBonus = venue.credBonus;
  let hypeBonus = venue.hypeBonus;

  let resultText = '';
  if (success > 0.75) {
    pay = Math.round(pay * 1.3);
    hypeBonus = Math.round(hypeBonus * 1.4);
    resultText = pick([
      `${band.name} absolutely destroyed ${venue.name}. The crowd was a living, breathing organism of sweat and devotion.`,
      `The show was transcendent. Someone in the crowd was crying. Someone else was crowd-surfing. Same person.`,
      `${band.name} played like their lives depended on it. Three people in the audience immediately started bands.`,
      `Standing ovation at ${venue.name}. The bartender stopped pouring drinks to listen. That never happens.`,
    ]);
  } else if (success > 0.45) {
    resultText = pick([
      `Solid show at ${venue.name}. Not their best, not their worst. The merch table did okay.`,
      `${band.name} played a good set. A few new fans, a few spilled beers. Standard Tuesday.`,
      `Decent turnout at ${venue.name}. The sound guy actually got the monitors right for once.`,
    ]);
  } else {
    pay = Math.round(pay * 0.5);
    hypeBonus = Math.round(hypeBonus * 0.3);
    credBonus = Math.round(credBonus * 0.5);
    resultText = pick([
      `${band.name} had an off night. The guitarist broke a string in the second song. The drummer was visibly annoyed.`,
      `Sparse crowd at ${venue.name}. ${band.name} played to mostly bartenders and one very committed fan.`,
      `The show was fine until the power went out during the encore. The acoustic improvisation did not go well.`,
    ]);
    band.morale = clamp(band.morale - 5, 0, 100);
  }

  state.budget += pay;
  state.credibility = clamp(state.credibility + credBonus, 0, 100);
  state.hype = clamp(state.hype + hypeBonus, 0, 100);
  band.fanBase += Math.round(hypeBonus * 10);
  band.morale = clamp(band.morale + (success > 0.6 ? 5 : -2), 0, 100);

  // Show result with venue name, crowd animation, and revenue counter
  let html = `
    <div style="text-align:center; margin-bottom:0.5rem;">
      <div style="font-size:1.2rem; font-weight:900; text-transform:uppercase; letter-spacing:0.15em; animation: fadeInDown 0.3s ease;">${venue.name}</div>
    </div>
    <div class="event-card info" style="animation: fadeInUp 0.4s ease 0.2s forwards; opacity: 0;">
      <div style="font-weight:700; margin-bottom:0.3rem;">${band.name} @ ${venue.name}</div>
      ${resultText}
      ${createCrowdAnimation(success)}
      <div style="margin-top:0.8rem; text-align:center;">
        <span class="revenue-counter">+$${pay}</span>
      </div>
      <div style="margin-top:0.3rem; font-size:0.75rem; color:var(--sage);">
        Cred ${credBonus > 0 ? '+' : ''}${credBonus} | Hype +${hypeBonus}
      </div>
    </div>`;

  setActionPanel('Show Result', html);
  addHistory(`${band.name} played ${venue.name} (+$${pay})`);
  renderAll();
  playBandMusic(band);
}

// NEXT MONTH
async function nextMonth() {
  const prevMonth = state.month;
  state.month++;

  // Hype decay
  state.hype = clamp(state.hype - 3, 0, 100);

  // Monthly costs
  const monthlyCosts = 200 + state.roster.length * 100;
  state.budget -= monthlyCosts;

  // Morale changes
  state.roster.forEach(band => {
    if (band.ego > 7) band.morale = clamp(band.morale - 3, 0, 100);
    if (band.drama > 7 && Math.random() > 0.5) band.morale = clamp(band.morale - 5, 0, 100);
    band.morale = clamp(band.morale + 2, 0, 100);
  });

  state.actionsLeft = 3;

  // Check for game over
  if (state.month >= 72) {
    endGame();
    return;
  }

  // Check for bankruptcy
  if (state.budget < -2000) {
    endGame(true);
    return;
  }

  // Year-end summary (December -> January transition)
  const prevMonthIdx = prevMonth % 12;
  const prevYear = 2001 + Math.floor(prevMonth / 12);
  if (prevMonthIdx === 11) {
    // Show year-end summary for the year that just ended
    await showYearEndSummary(prevYear);
  }

  // Month transition interstitial
  const isNewYear = (state.month % 12 === 0);
  await showMonthInterstitial(getMonthName(), getYear(), isNewYear);

  // Random events
  if (state.roster.length > 0 && Math.random() < 0.4) {
    triggerDramaEvent();
  } else if (Math.random() < 0.15) {
    triggerIndustryOffer();
  } else {
    if (isNewYear) {
      const year = getYear();
      setActionPanel("What's Hot in " + year, `<div class="event-card info">
        <b>Genre trends for ${year}:</b><br>
        ${Object.entries(trends[year] || {}).map(([g, v]) => {
          const label = v >= 0.8 ? 'HOT' : v >= 0.5 ? 'warm' : v >= 0.3 ? 'cool' : 'cold';
          const color = v >= 0.8 ? 'var(--faded-red)' : v >= 0.5 ? 'var(--mustard)' : '#888';
          return `<span style="color:${color}; font-weight:${v >= 0.7 ? '700' : '400'}">${g}: ${label}</span>`;
        }).join(' | ')}
      </div>`);
    } else {
      setActionPanel("What's the Move?", '<div class="select-band-prompt">Choose an action below.</div>');
    }
  }

  saveGame();
  addHistory(`Advanced to ${getDateStr()}. Costs: -$${monthlyCosts}`);
  renderAll();
}

function triggerDramaEvent() {
  const band = pick(state.roster);
  const event = pick(DRAMA_EVENTS);

  if (event.cost && state.budget < event.cost) {
    const freeEvents = DRAMA_EVENTS.filter(e => !e.cost);
    if (freeEvents.length === 0) return;
    return showDramaEvent(band, pick(freeEvents));
  }
  showDramaEvent(band, event);
}

function showDramaEvent(band, event) {
  let text = event.text.replace(/\[BAND\]/g, band.name);
  text = text.replace(/\[SIDENAME\]/g, generateBandName());
  const effectStr = event.effect(band, state);

  let html = `<div class="event-card drama" style="animation: fadeInUp 0.3s ease;">
    ${text}
    <div style="margin-top:0.5rem; font-size:0.7rem; color:var(--faded-red);">${effectStr}</div>
  </div>`;

  setActionPanel('Drama!', html);
  addHistory(`Drama: ${text.substring(0, 60)}...`);
}

function triggerIndustryOffer() {
  const offer = pick(INDUSTRY_OFFERS);
  const band = state.roster.length > 0 ? pick(state.roster) : null;
  const text = offer.getText(state, band);

  showModal(offer.title, text, [
    { label: 'Accept', class: 'btn-play', action: () => {
      const result = offer.accept(state, band);
      addHistory(`Accepted: ${offer.title} (${result})`);
      setActionPanel('Deal Done', `<div class="event-card offer" style="animation: fadeInUp 0.3s ease;">You accepted the ${offer.title}.<br><span style="font-size:0.75rem; color:var(--sage);">${result}</span></div>`);
      renderAll();
    }},
    { label: 'Decline', action: () => {
      const result = offer.decline(state);
      addHistory(`Declined: ${offer.title} (${result})`);
      setActionPanel('Stayed True', `<div class="event-card info" style="animation: fadeInUp 0.3s ease;">You turned down the ${offer.title}. Your integrity is intact.<br><span style="font-size:0.75rem; color:var(--denim);">${result}</span></div>`);
      renderAll();
    }},
  ]);
}

function endGame(bankrupt) {
  stopMusic();
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('end-screen').style.display = 'block';

  const bnmCount = state.albums.filter(a => a.isBNM).length;
  const avgScore = state.albums.length > 0 ? state.albums.reduce((s, a) => s + a.score, 0) / state.albums.length : 0;

  let finalPoints = 0;
  finalPoints += state.credibility * 2;
  finalPoints += Math.max(0, state.budget) / 100;
  finalPoints += bnmCount * 50;
  finalPoints += state.roster.length * 10;
  finalPoints += state.albums.length * 15;
  finalPoints += avgScore * 10;
  finalPoints += state.hype;

  let rank;
  if (bankrupt) rank = 'Bankrupt in Brooklyn';
  else if (finalPoints < 100) rank = 'Sold Out';
  else if (finalPoints < 200) rank = 'One-Hit Wonder';
  else if (finalPoints < 350) rank = 'Indie Darling';
  else if (finalPoints < 500) rank = 'The Next Sub Pop';
  else rank = 'True Legend';

  document.getElementById('final-rank').textContent = rank;

  let statsHtml = '';
  const stats = [
    ['Label', state.labelName],
    ['Final Budget', '$' + state.budget.toLocaleString()],
    ['Credibility', state.credibility + '/100'],
    ['Hype', state.hype + '/100'],
    ['Total Albums', state.albums.length],
    ['Best New Music', bnmCount],
    ['Avg Pitchfork Score', avgScore.toFixed(1)],
    ['Roster Size', state.roster.length + ' bands'],
    ['Final Score', Math.round(finalPoints) + ' pts'],
  ];
  stats.forEach(([label, val]) => {
    statsHtml += `<div class="final-stat"><span>${label}</span><span class="stat-val">${val}</span></div>`;
  });
  document.getElementById('final-stats').innerHTML = statsHtml;

  const galleryEl = document.getElementById('album-gallery');
  galleryEl.innerHTML = '';
  state.albums.forEach(album => {
    const item = document.createElement('div');
    item.className = 'album-gallery-item';
    const scoreColor = album.score >= 8.5 ? 'var(--sage)' : album.score >= 7.0 ? 'var(--denim)' : album.score >= 5.0 ? 'var(--mustard)' : 'var(--faded-red)';
    item.innerHTML = `
      <div class="album-art" style="${album.artCSS}"></div>
      <div class="album-title">${album.name}</div>
      <div class="album-band">${album.band}</div>
      <div class="album-score-tag" style="color:${scoreColor}">${album.score.toFixed(1)}${album.isBNM ? ' BNM' : ''}</div>
    `;
    galleryEl.appendChild(item);
  });

  if (rank === 'True Legend') spawnConfetti();

  saveHighScore(rank, finalPoints);
}

// ---- Save / Load ----
function saveGame() {
  try { localStorage.setItem('matador-dreams-save', JSON.stringify(state)); } catch (e) {}
}

function loadGame() {
  try {
    const saved = localStorage.getItem('matador-dreams-save');
    if (saved) return JSON.parse(saved);
  } catch (e) {}
  return null;
}

function saveHighScore(rank, score) {
  try {
    const scores = JSON.parse(localStorage.getItem('matador-dreams-highscores') || '[]');
    scores.push({ label: state.labelName, rank, score: Math.round(score), date: new Date().toISOString() });
    scores.sort((a, b) => b.score - a.score);
    localStorage.setItem('matador-dreams-highscores', JSON.stringify(scores.slice(0, 10)));
  } catch (e) {}
}

// ---- Start Game ----
function startGame() {
  initAudio();
  initVisualizer();

  const labelName = document.getElementById('label-name-input').value.trim() || 'Trembling Ear Records';

  state = {
    month: 0,
    budget: 5000,
    credibility: 50,
    hype: 20,
    roster: [],
    albums: [],
    actionsLeft: 3,
    history: [],
    offers: [],
    labelName: labelName,
  };

  selectedBandIndex = -1;
  currentAction = null;

  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('history-log').innerHTML = '';

  addHistory(`${labelName} opens its doors in Brooklyn.`);
  renderAll();

  setActionPanel('Welcome to Brooklyn, ' + getYear(), `<div class="event-card info" style="animation: fadeInUp 0.4s ease;">
    It's January 2001. You've got $5,000, a phone full of booking agent numbers, and a burning conviction that the world needs more bands that sound like Joy Division crossed with Pavement.<br><br>
    The Strokes just played Mercury Lounge. Interpol is rehearsing somewhere in the East Village. The internet is about to change everything, but nobody knows that yet.<br><br>
    You have six years to build something real. Scout bands. Record albums. Book shows. Chase Pitchfork reviews. Resist the temptation to sell out. Or don't -- that's a strategy too.<br><br>
    <b>3 actions per month. Use them wisely.</b>
  </div>`);
}

// ---- Init ----
window.addEventListener('DOMContentLoaded', () => {
  showTitleAnimation();
  initVisualizer();

  document.getElementById('label-name-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') startGame();
  });

  const saved = loadGame();
  if (saved && saved.month > 0 && saved.month < 72) {
    showModal('Continue?', `Found a saved game: <b>${saved.labelName}</b>, ${MONTHS[saved.month % 12]} ${2001 + Math.floor(saved.month / 12)}.`, [
      { label: 'Continue', class: 'btn-play', action: () => {
        initAudio();
        initVisualizer();
        state = saved;
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('history-log').innerHTML = '';
        state.history.forEach(h => {
          const entry = document.createElement('div');
          entry.className = 'history-entry';
          entry.innerHTML = `<span class="h-date">${h.date}</span> ${h.text}`;
          document.getElementById('history-log').appendChild(entry);
        });
        renderAll();
        setActionPanel("What's the Move?", '<div class="select-band-prompt">Welcome back. Choose an action below.</div>');
      }},
      { label: 'New Game', action: () => {
        localStorage.removeItem('matador-dreams-save');
      }},
    ]);
  }
});
</script>
